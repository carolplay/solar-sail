<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Solar Infrastructure Viewer</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="app-shell">
      <section class="viewer" aria-label="Solar network visualization">
        <canvas id="solarCanvas"></canvas>
        <div class="hud top-left">
          <div class="kicker">Demo 001</div>
          <h1>Solar Infrastructure Viewer</h1>
          <div class="date-row">
            <span id="simDate">--</span>
            <span id="statusPill" class="status-pill">Running</span>
          </div>
        </div>

        <div class="hud mode-switcher" aria-label="View mode">
          <button class="mode-button active" data-view-mode="orbit" type="button">Orbit View</button>
          <button class="mode-button" data-view-mode="gravity" type="button">Gravity Well View</button>
          <button class="mode-button" data-view-mode="manifold" type="button">Low-Energy Routes View</button>
        </div>

        <div class="hud scale-switcher" aria-label="Scale mode">
          <button class="scale-button active" data-scale-mode="solar" type="button">Solar System</button>
          <button class="scale-button" data-scale-mode="inner" type="button">Inner System</button>
          <button class="scale-button" data-scale-mode="earth" type="button">Earth Gateway</button>
          <button class="scale-button" data-scale-mode="mars" type="button">Mars Gateway</button>
          <button class="scale-button" data-scale-mode="ceres" type="button">Ceres / Belt</button>
        </div>

        <div class="hud controls" aria-label="Simulation controls">
          <div class="control-group" aria-label="Simulation speed">
            <button class="speed-button active" data-speed="1" type="button">1x</button>
            <button class="speed-button" data-speed="10" type="button">10x</button>
            <button class="speed-button" data-speed="100" type="button">100x</button>
            <button class="speed-button" data-speed="1000" type="button">1000x</button>
          </div>
          <button id="pauseButton" class="icon-button" type="button" title="Pause simulation" aria-label="Pause simulation">
            <span id="pauseIcon">||</span>
          </button>
          <button id="zoomOutButton" class="icon-button" type="button" title="Zoom out" aria-label="Zoom out">-</button>
          <button id="zoomInButton" class="icon-button" type="button" title="Zoom in" aria-label="Zoom in">+</button>
          <label class="toggle">
            <input id="orbitToggle" type="checkbox" checked>
            <span>Orbits</span>
          </label>
        </div>

        <aside class="hud inspector" aria-live="polite">
          <div class="panel-title">Inspection</div>
          <h2 id="inspectName">Select an object</h2>
          <p id="inspectRoute">Click a planet, station point, cycler, or shuttle to inspect its route.</p>
          <dl id="inspectDetails"></dl>
          <div class="schedule">
            <div class="panel-title">Shuttle Schedule</div>
            <div id="scheduleList" class="schedule-list"></div>
          </div>
        </aside>

        <div class="legend" aria-label="Object legend">
          <span><i class="legend-planet"></i> Worlds</span>
          <span><i class="legend-cycler"></i> Cycler</span>
          <span><i class="legend-shuttle"></i> Shuttle transfers</span>
          <span><i class="legend-point"></i> Lagrange points</span>
          <span><i class="legend-corridor"></i> Low-energy corridors</span>
        </div>
      </section>
    </main>
    <script src="app.js"></script>
  </body>
</html>
